<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#f7f4e8">
  <title>初二古诗文背诵游戏</title>
  <meta name="description" content="初二语文古诗文背诵辅助小游戏：下一句闯关、诗句排序、作者朝代匹配、难句本">
  <!-- Open Graph / WeChat link preview -->
  <meta property="og:title" content="初二古诗文背诵游戏 · 诗意闯关">
  <meta property="og:description" content="18 首诗 + 7 篇文言文，下一句闯关、拖拽排序、作者朝代匹配，帮助初二学生轻松背诵古诗文。">
  <meta property="og:type" content="website">
  <meta property="og:image" content="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect fill='%23f7f4e8' width='200' height='200'/%3E%3Ctext x='100' y='90' text-anchor='middle' font-size='80'%3E📖%3C/text%3E%3Ctext x='100' y='140' text-anchor='middle' font-size='28' fill='%232c5f72'%3E诗意闯关%3C/text%3E%3C/svg%3E">
  <meta property="og:url" content="">
  <!-- iOS web app -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="诗意闯关">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="hero-text">
        <p class="eyebrow">初二语文 · 古诗文背诵</p>
        <h1>诗意闯关</h1>
        <p class="subtitle">以诗会友，以文养心。选择下一句，挑战你的记忆。</p>
      </div>
      <div class="scoreboard" aria-label="成绩面板">
        <div class="stat">
          <span class="stat-value" id="score">0</span>
          <span class="stat-label">得分</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="streak">0</span>
          <span class="stat-label">连击</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="difficultCount">0</span>
          <span class="stat-label">难句</span>
        </div>
      </div>
    </header>

    <nav class="tabs" aria-label="游戏模式">
      <button class="tab active" data-tab="quiz">下一句闯关</button>
      <button class="tab" data-tab="order">诗句排序</button>
      <button class="tab" data-tab="meta">作者朝代</button>
      <button class="tab" data-tab="catalog">全篇目录</button>
      <button class="tab" data-tab="difficult">难句本</button>
    </nav>

    <main>
      <!-- 下一句闯关 -->
      <section id="panel-quiz" class="panel active">
        <div class="toolbar">
          <label for="quizFilter">范围</label>
          <select id="quizFilter"></select>
          <button id="nextQuizBtn" class="btn-ghost">换一题</button>
          <button id="resetQuizBtn" class="btn-ghost">重置</button>
          <button id="pinyinQuizBtn" class="btn-ghost">显示拼音</button>
        </div>
        <div id="quizCard" class="card question-card"></div>
        <div id="quizFeedback" class="feedback" aria-live="polite"></div>
      </section>

      <!-- 诗句排序 -->
      <section id="panel-order" class="panel">
        <div class="toolbar">
          <label for="orderSelect">篇目</label>
          <select id="orderSelect"></select>
          <button id="newOrderBtn" class="btn-ghost">打乱重排</button>
          <button id="checkOrderBtn" class="btn-primary">提交排序</button>
        </div>
        <div id="orderCard" class="card order-card"></div>
        <div id="orderFeedback" class="feedback" aria-live="polite"></div>
      </section>

      <!-- 作者朝代 -->
      <section id="panel-meta" class="panel">
        <div class="toolbar">
          <label for="metaType">题型</label>
          <select id="metaType">
            <option value="author">作者是谁</option>
            <option value="dynasty">哪个朝代</option>
          </select>
          <button id="nextMetaBtn" class="btn-ghost">换一题</button>
        </div>
        <div id="metaCard" class="card question-card"></div>
        <div id="metaFeedback" class="feedback" aria-live="polite"></div>
      </section>

      <!-- 全篇目录 -->
      <section id="panel-catalog" class="panel">
        <div class="toolbar">
          <label for="catalogFilter">筛选</label>
          <select id="catalogFilter">
            <option value="all">全部</option>
            <option value="poem">诗</option>
            <option value="prose">文言文</option>
          </select>
          <button id="pinyinCatalogBtn" class="btn-ghost">全部显示拼音</button>
        </div>
        <div id="catalogGrid" class="catalog-grid"></div>
      </section>

      <!-- 难句本 -->
      <section id="panel-difficult" class="panel">
        <div class="toolbar">
          <button id="practiceDifficultBtn" class="btn-primary">只练难句</button>
          <button id="clearDifficultBtn" class="btn-ghost">清空难句</button>
        </div>
        <div id="difficultList" class="difficult-list"></div>
      </section>
    </main>

    <footer class="footer">
      <p>本地小游戏 · 得分与难句自动保存在浏览器中</p>
      <button id="shareBtn" class="btn-ghost" style="margin-top:10px;">📤 分享给同学</button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
